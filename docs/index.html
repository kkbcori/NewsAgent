nergy stability", "Balanced approach", "Market forces"]}}}, {"source_url": "https://www.bbc.com/news/articles/cy41vqx4pdzo?at_medium=RSS&at_campaign=rss", "original_title": "Most Syrian refugees in Germany expected to return home in three years, Merz says", "original_summary": "Merz\u2019s government has taken a tougher line on refugees and migrants, amid surging support for the anti-immigration AfD party.", "source_name": "BBC Europe", "category": "world", "image_url": "https://ichef.bbci.co.uk/news/1024/branded_news/6330/live/571088e0-2c60-11f1-88c4-254a3d5fc979.jpg", "youtube_id": null, "video_url": null, "content": {"rewrite": "Germany's new leader says most Syrian refugees will head home within 3 years as Berlin shifts right on immigration. The same country that opened its doors during the 2015 crisis now betting on mass returns. Politics changes, people's lives hang in balance.", "hot_take": "Germany's Merz promising mass Syrian deportations after years of virtue signaling about \"Willkommen\" culture. Europe's refugee crisis was always about optics, not genuine compassion \u2014 the moment it becomes politically costly, the mask comes off. #RefugeeCrisis", "thread": ["Germany's CDU leader Merz expects most Syrian refugees to return home within 3 years as Damascus falls. The same country that welcomed 1M+ Syrians during the 2015 crisis now signals a harder line. Political winds shifting? \ud83e\uddf5", "This isn't just about Syria. Merz's tougher stance comes as the far-right AfD surges in polls, forcing mainstream parties to adopt stricter migration policies. The refugee crisis that defined Merkel's era is being rewritten.", "For India watching Europe's migration debates: when geopolitics shifts, so does hospitality. Today's humanitarian gesture becomes tomorrow's political liability. Will Syria's rebuilding actually create conditions for safe return, or is this wishful policy-making? \ud83e\udd14"], "poll": {"tweet": "Germany's Merz expects most Syrian refugees to return home within 3 years as his govt takes harder line on immigration amid rising AfD support. What should be the priority for Syrian refugees now?", "options": ["Safe voluntary return", "Integration support", "Temporary protection", "Individual choice"]}}}, {"source_url": "https://www.dw.com/en/finnish-police-say-stray-ukrainian-drone-carried-warhead/a-76596061?maca=en-rss-en-eu-2092-rdf", "original_title": "Finnish police say stray Ukrainian drone carried warhead", "original_summary": "Finnish authorities are investigating two drones that crashed in southern Finland. Kyiv apologized for the incident, with Ukraine's Zelenskyy saying he and Finland's Stubb are on the same page.", "source_name": "DW Europe", "category": "world", "image_url": "https://static.dw.com/image/76595669_6.jpg", "youtube_id": null, "video_url": null, "content": {"rewrite": "Finnish police confirm Ukrainian drone that crashed in southern Finland was armed with a warhead. Zelensky quickly apologized to President Stubb after the cross-border incident. When your neighbor's military hardware lands in your backyard unexpectedly...", "hot_take": "Finland finds Ukrainian drone with warhead on its soil, Zelenskyy apologizes, everyone moves on. Meanwhile India gets lectured about \"escalation\" every time we sneeze near our own borders. Western solidarity has different rules, clearly. #DoubleStandards", "thread": ["Finnish police confirm Ukrainian drone carrying warhead crashed on their soil. Finland's investigating, Ukraine's apologizing. When allies' weapons go astray, diplomacy gets messy fast. \ud83c\uddeb\ud83c\uddee\ud83c\uddfa\ud83c\udde6", "Zelensky called Finland's President Stubb to smooth things over. Both leaders say they're 'on the same page' - but stray military hardware crossing NATO borders isn't exactly a footnote in wartime geopolitics.", "Two drones crashed in southern Finland. One armed, one not. Ukraine admits fault and apologizes. The incident highlights how modern warfare's precision weapons can still go very, very wrong.", "For India watching from sidelines: Even close allies face awkward moments when military ops spill over borders. Finland stays supportive of Ukraine, but sovereignty matters everywhere. How would we handle such 'accidents'?"], "poll": {"tweet": "Ukrainian drone with warhead crashes in Finland. Zelensky apologizes, Finland investigates. Another sign of how this war's spillover effects reach far beyond Ukraine's borders?", "options": ["Accident, move on", "Needs investigation", "Escalation risk", "Normal in wartime"]}}}, {"source_url": "https://www.dw.com/en/pope-leo-condemns-using-god-to-justify-war-in-palm-sunday-mass/a-76585338?maca=en-rss-en-eu-2092-rdf", "original_title": "Pope Leo condemns using God to justify war in Palm Sunday mass", "original_summary": "The pope has said God rejects the prayers of those who wage war and have \"hands full of blood.\" Leo has also prayed especially for Christians in the Middle East during a Palm Sunday Mass.", "source_name": "DW Europe", "category": "world", "image_url": "https://static.dw.com/image/76585167_6.jpg", "youtube_id": null, "video_url": null, "content": {"rewrite": "Pope calls out warmongers with \"hands full of blood,\" saying God rejects their prayers. Strong words during Palm Sunday Mass as he prayed for Middle East Christians. When the head of 1.3 billion Catholics speaks this directly about war, the world should listen.", "hot_take": "The Pope saying God rejects prayers from warmongers while Christians are being persecuted in the Middle East isn't subtle messaging\u2014it's a direct callout to leaders using religion as a war banner. About time someone with this platform said it. #PalmSunday", "thread": ["Pope Francis drops truth bombs on Palm Sunday: God rejects prayers from those with 'hands full of blood' who use His name to justify war. Imagine the awkward silence in certain capitals right now. \ud83d\udd25", "The Pope specifically prayed for Middle Eastern Christians during mass - a not-so-subtle dig at leaders weaponizing religion for geopolitical gains. When the Vatican calls out your hypocrisy, you know you've crossed a line.", "In an era where 'God is on our side' has become the laziest justification for violence, Francis reminds us: the Almighty doesn't take sides in human bloodshed. He rejects it entirely.", "This isn't just theology - it's geopolitics. Which world leaders claiming divine mandate for their wars are feeling called out right now? And will it change anything, or just create more awkward diplomatic dinners?"], "poll": {"tweet": "Pope Francis condemns using God to justify war, says divine prayers are rejected by those with 'hands full of blood.' Strong words during Palm Sunday mass. What's your take on religious leaders speaking out against war?", "options": ["Essential moral duty", "Should stay neutral", "Too political", "Context matters"]}}}, {"source_url": "https://www.theguardian.com/world/2026/mar/31/ukraine-war-briefing-allies-asked-kyiv-about-reducing-attacks-on-russian-energy-sector-zelenskyy-says", "original_title": "Ukraine war briefing: allies asked Kyiv about reducing attacks on Russian energy sector, Zelenskyy says", "original_summary": "President says he is open to scaling back strikes on oil and wider energy industry if Moscow reciprocates. What we know on day 1,496 Continue reading...", "source_name": "The Guardian EU", "category": "world", "image_url": "https://i.guim.co.uk/img/media/09b6bcfe6394c4326cbe08e0c3a1f36a7bfdd068/1122_616_6082_4866/master/6082.jpg?width=140&quality=85&auto=format&fit=max&s=ef04b9a398df6a87ccda471a1ef095ab", "youtube_id": null, "video_url": null, "content": {"rewrite": "Ukraine's allies nudged Kyiv to ease up on hitting Russian oil facilities. Zelenskyy's response? Sure, if Moscow plays nice too. Day 1,496 and the diplomatic chess game continues while winter looms #UkraineWar", "hot_take": "Europe asking Ukraine to dial down attacks on Russian oil while Putin bombs Ukrainian power plants daily is peak Western hypocrisy. You don't ask the victim to fight with one hand tied behind their back. #UkraineWar", "thread": ["Ukraine's Zelensky reveals allies have asked him to dial down attacks on Russian energy sector. After 1,496 days of war, is this diplomacy or pressure? \ud83e\uddf5", "Zelensky says he's open to scaling back oil/energy strikes - but ONLY if Moscow reciprocates. The catch: Russia has been systematically targeting Ukrainian civilian infrastructure for months.", "This comes as winter approaches and Europe watches energy markets nervously. Are Western allies prioritizing stability over Ukraine's right to defend itself however it can?", "The real question: After nearly 4 years of war, should Ukraine have to negotiate how it fights back against an aggressor that targets hospitals and schools?"], "poll": {"tweet": "Ukraine open to scaling back energy strikes if Russia reciprocates - a potential breakthrough after 1,496 days of war. Could this diplomatic opening change the trajectory?", "options": ["Yes, good first step", "No, Russia won't comply", "Too little, too late", "Need more details"]}}}, {"source_url": "https://www.theguardian.com/uk-news/2026/mar/30/uk-france-beach-patrol-deal-intercept-small-boats-negotiations-deadlocked", "original_title": "Small boats deal between France and UK is on verge of collapse", "original_summary": "Negotiations deadlocked as No 10 wants more action on beach patrols but France has concerns over safetyThe UK\u2019s agreement with France to pay for beach patrols is on the verge of collapse amid wrangling over the number of small boat interceptions and the safety of asylum seekers in French waters.Negotiations over plans to revamp the three-year, \u00a3480m deal remain deadlocked, despite the involvement of ministers including Shabana Mahmood, the home secretary. The deal expires at midnight on Tuesday. Continue reading...", "source_name": "The Guardian EU", "category": "worl hould end"]}}}, {"source_url": "https://www.abc.net.au/news/2026-03-31/voter-issues-to-be-reviewed-following-sa-election/106515150", "original_title": "MP's extra voting paper for SA upper house among electoral problems under scrutiny", "original_summary": "As authorities commit to a review of problems faced by South Australian voters during this month's election, a former Liberal MP says he was concerned to received an extra ballot paper in the post.", "source_name": "ABC Australia", "category": "world", "image_url": "https://live-production.wcms.abc-cdn.net.au/9355e2eabbbe5b3de79f47e7786968fb?impolicy=wcms_crop_resize&cropH=460&cropW=818&xPos=22&yPos=0&width=862&height=485", "youtube_id": null, "video_url": null, "content": {"rewrite": "Former Liberal MP gets TWO ballot papers for South Australia's upper house election. Just casual democracy things, apparently. Electoral authorities now scrambling to review multiple voting problems after citizens couldn't even cast their votes properly. #AustralianPolitics", "hot_take": "Australia's democracy looking as messy as ours these days \u2014 MPs getting extra ballot papers, voters facing \"problems\" during elections. At least they're admitting it needs scrutiny instead of calling critics anti-national \ud83e\udd37\u200d\u2642\ufe0f #AustraliaElections", "thread": ["A former Liberal MP in South Australia received an EXTRA ballot paper in the mail during this month's election. If MPs are getting duplicate votes, what's happening to regular citizens? \ud83c\udde6\ud83c\uddfa", "SA electoral authorities are now launching a full review after multiple voting irregularities surfaced. This isn't just about one extra ballot - it's about systemic problems that could affect election outcomes.", "For Indians watching: Australia's electoral integrity under question while we debate EVMs vs paper ballots. Maybe the real issue isn't the technology but the processes? What's your take on voting systems? \ud83d\uddf3\ufe0f"], "poll": {"tw g efforts to have them scrutinised by a new watchdog.On Monday, legislation to establish the independent Australian Tertiary Education Commission (Atec) passed the Senate with a number of amendments, including to improve its resourcing a", "source_name": "The Guardian AU", "category": "world", "image_url": "https://i.guim.co.uk/img/media/c55c5f2bdab9851a48b11a614d65632d8bf33633/426_0_4263_3410/master/4263.jpg?width=140&quality=85&auto=format&fit=max&s=c5a9402b6c84080e4a7f1d3d696a48b6", "youtube_id": null, "video_url": null, "content": {"rewrite": "Australia's Labor govt quietly kills promised university fee reforms, rejecting watchdog oversight of Morrison's controversial Jobs-Ready scheme. Students still paying inflated costs while politicians dodge accountability. Some promises have expiry dates.", "hot_take": "Labor's dodging uni fee reform like it's a student loan debt collector at the door. They promised to fix Morrison's jobs-ready graduates scam but now won't even let a watchdog sniff around the books. Classic case of election promises vs. governing reality. #AusPol", "thread": ["\ud83c\udf93 Australia's Labor govt just rejected scrutiny of the controversial 'Jobs-Ready Graduates' scheme that's making uni degrees unaffordable. So much for election promises to fix education costs. Students getting played again? \ud83e\uddf5", "The scheme hiked fees for humanities/arts by 113% while cutting STEM costs - social engineering disguised as economics. Now Labor won't even let their new education watchdog examine if it's working. Accountability much?", "For Indian students eyeing Australian unis: this fee structure directly impacts international costs too. When domestic fees soar, guess what happens to yours? The 'education export' model showing its true colors.", "Labor promised reform, students voted accordingly. Now they're protecting Morrison's legacy while your degrees get pricier. Maybe it's time students reminded politicians that promises have consequences? \ud83d\uddf3\ufe0f"], "poll": {"tweet": "Australia's Labor govt rejects scrutiny of soaring university fees, despite promises to reform Morrison's controversial scheme. Indian students face massive debt burdens studying there. Should govts be held accountable for education promises?", "options": ["Always accountable", "Depends on economy", "After full term", "Promises aren't binding"]}}}, {"source_url": "https://www.sbs.com.au/news/article/bab-al-mandab-strait-oil-supply-chain-risks-middle-east-war/mejt94n74", "original_title": "A new front in the energy crisis? A 'catastrophic' threat looms over another key waterway", "original_summary": "The Bab al-Mandab Strait, or the 'Gate of Tears', could be targeted next, threatening another critical artery for global oil flow.", "source_name": "SBS News", "category": "world", "image_url": "https://assets.sbs.com.au/dims4/default/59a092b/2147483647/strip/false/crop/5760x2647+0+597/resize/1234x567!/format/jpeg/quality/90/?url=https%3A%2F%2Fsbs-au-brightspot.s3.ap-southeast-2.amazonaws.com%2F43%2F18%2F986058704dd781700377c63f5b44%2Fgettyimages-1546597385.jpg", "youtube_id": null, "video_url": null, "content": {"rewrite": "The \"Gate of Tears\" strait could be next on the target list, potentially choking off another vital oil route. Because apparently one energy crisis wasn't enough drama for 2024. Global supply chains holding their breath again.", "hot_take": "The West is learning what happens when you ignore regional conflicts for decades. First Suez, now Bab al-Mandab under threat. Global energy chokepoints aren't just Middle East problems\u2014they're everyone's problem when your gas prices spike. #EnergyGeopolitics", "thread": ["THREAD: First Suez, now the 'Gate of Tears'? The Bab al-Mandab Strait - where 10% of global oil flows - is emerging as the next flashpoint in our interconnected energy crisis. Another choke point, another nightmare for supply chains \ud83e\uddf5", "The strait between Yemen and Djibouti is just 18 miles wide at its narrowest. Red Sea shipping already disrupted by Houthi attacks is now eyeing this bottleneck nervously. One incident here = oil prices through the roof globally.", "For India, this hits different. We import 85% of our oil, much via these routes. Bab al-Mandab closure would force ships around Africa - adding 10+ days and massive costs. Your fuel prices are watching this space closely.", "The domino effect is real: Suez delays, Red Sea attacks, now Bab al-Mandab threats. When will we learn that putting global trade through these narrow corridors is like playing Russian roulette with the world economy?"], "poll": {"tweet": "After Suez disruptions, now Bab al-Mandab Strait faces threats. This 'Gate of Tears' carries 10% of global trade & oil. Another choke point at risk could reshape energy prices worldwide. What worries you most?", "options": ["Higher fuel costs", "Supply chain chaos", "Regional instability", "Economic recession"]}}}, {"source_url": "https://www.sbs.com.au/news/article/iran-says-us-peace-proposals-unrealistic-as-trump-threatens-threatens-to-destroy-iran-oil-island/320khxhg8", "original_title": "Iran says US peace proposals 'unrealistic' as Trump threatens to 'obliterate' oil island", "original_summary": "Thousands of US troops have arrived in the Middle East after Trump threatened Iran with military action.", "source_name": "SBS News", "category": "world", "image_url": "https://assets.sbs.com.au/dims4/default/715f650/2147483647/strip/false/crop/6000x2757+0+622/resize/1234x567!/format/jpeg/quality/90/?url=https%3A%2F%2Fsbs-au-brightspot.s3.ap-southeast-2.amazonaws.com%2F51%2F2b%2F4bb231cf4494ada7ca75416b18cb%2Ftrump-white-house.jpg", "youtube_id": null, "video_url": null, "content": {"rewrite": "Iran calls US peace talks \"unrealistic\" while Trump threatens to \"obliterate\" their oil facilities. Thousands of American troops now deployed across the Middle East. Classic diplomacy: negotiate with a gun to your head. This escalation benefits nobody except arms dealers. #MiddleEast", "hot_take": "Trump's \"obliterate\" threats while Iran calls peace talks \"unrealistic\" - both sides performing for domestic audiences while the world holds its breath. Classic escalation theater where everyone's tough until the oil prices spike and voters feel it at the pump. #MiddleEast", "thread": ["\ud83d\udea8 Trump threatens to 'obliterate' Iranian oil island as thousands of US troops flood the Middle East. Iran calls American peace proposals 'unrealistic.' We've seen this movie before - but this time the stakes are nuclear. \ud83e\uddf5", "The irony is thick: Trump offers 'peace proposals' while simultaneously deploying massive military force and issuing obliteration threats. Iran's rejection seems rational when your negotiating partner has a gun to your head.", "Oil markets are already jittery, and any conflict could send global fuel prices soaring - hitting Indian consumers hard. Meanwhile, both sides seem more interested in posturing than actual diplomacy.", "History lesson: Every major Middle East conflict promised to be 'quick and decisive.' None were. As Indians watching from afar, we should ask - when has military threats ever led to lasting peace in this region? \ud83e\udd14"], "poll": {"tweet": "Trump threatens to 'obliterate' Iranian oil facilities while thousands of US troops deploy to Middle East. Iran calls US peace proposals 'unrealistic.' Another cycle of escalation begins. What's the likely outcome?", "options": ["Diplomatic solution", "Limited military action", "Full-scale conflict", "Status quo continues"]}}}, {"source_url": "https://www.ndtv.com/world-news/iran-war-news-updates-pete-hegseths-broker-tried-to-buy-defence-fund-before-iran-war-what-pentagon-said-11289295#publisher=newsstand", "original_title": "Pete Hegseth's Broker Tried To Buy Defence Fund Before Iran War? What US Said", "original_summary": "Hegseth's broker at Morgan Stanley approached BlackRock in February", "source_name": "NDTV", "category": "india", "image_url": "https://c.ndtvimg.com/2026-03/jjh0kmf8_trump-pete-hegseth_625x300_24_March_26.jpeg?im=FeatureCrop,algorithm=dnn,width=1200,height=738", "youtube_id": null, "video_url": null, "content": {"rewrite": "Trump's defense pick Hegseth's broker quietly approached BlackRock about defense stocks just before Iran tensions peaked. Nothing suspicious here, just perfect timing on military investments. America's revolving door between Wall Street and war machine keeps spinning. #DefenseStocks", "hot_take": "Hegseth's broker shopping for defense stocks before potential Iran war while he's nominated for Defense Secretary? This isn't insider trading prep, this is the military-industrial complex saying the quiet part out loud. America's wars aren't foreign policy\u2014they're investment strategies. #Pentagon", "thread": ["Pete Hegseth's broker tried to buy defence stocks just before potential Iran escalation? The timing is... interesting. \ud83e\udd14", "Morgan Stanley broker approached BlackRock in February - right when Iran tensions were heating up. Classic case of 'knowing something the market doesn't'?", "Meanwhile, Hegseth was pushing for aggressive Iran policy on Fox News. Coincidence or conflict of interest? The revolving door between media-military-finance strikes again.", "Question for our own defence establishment: How many of our TV generals and policy hawks have similar 'arrangements'? Transparency starts with asking the right questions."], "poll": {"tweet": "Pete Hegseth's broker tried buying defense stocks before potential Iran war. Insider trading or just good timing? What's your take?", "options": ["Insider trading", "Coincidence", "Smart investing", "Needs investigation"]}}}, {"source_url": "https://www.ndtv.com/world-news/iran-war-news-massive-blasts-in-irans-isfahan-after-us-israeli-strikes-trump-shares-video-11289048#publisher=newsstand", "original_title": "US Drops 900-kg Bunker Buster Bomb On Iran's Isfahan, Trump Shares Video", "original_summary": "The strikes reportedly hit a ammunition depot in Isfahan", "source_name": "NDTV", "category": "india", "image_url": "https://c.ndtvimg.com/2026-03/48jefjg8_isfahan_625x300_31_March_26.jpg?im=FitAndFill,algorithm=dnn,width=1200,height=738", "youtube_id": null, "video_url": null, "content": {"rewrite": "Trump posts video of 900kg bunker buster hitting Iranian ammo depot in Isfahan. Because nothing says \"peace through strength\" like dropping social media content along with the bombs. The man really can't resist a good explosion reel.", "hot_take": "America drops 900kg bunker busters on Iran while lecturing the world about \"proportional response\" and \"international law.\" The same playbook since Iraq - bomb first, justify later. Watch how quickly \"rules-based order\" becomes \"might makes right.\" #Iran #USForeignPolicy", "thread": null, "poll": {"tweet": "US drops 900kg bunker buster on Iran's Isfahan ammunition depot. Trump shares the video. Iran-Israel proxy war now has direct US involvement. What's your take on escalation?", "options": ["Justified response", "Dangerous escalation", "Iran provoked this", "US overreach"]}}}, {"source_url": "https://timesofindia.indiatimes.com/world/us/willing-to-end-war-without-re-opening-hormuz-donald-trump-tells-aides-as-iran-refuses-to-budge/articleshow/129915322.cms", "original_title": "Willing to end war without re-opening Hormuz, Donald Trump tells aides as Iran refuses to budge", "original_summary": "President Trump is reportedly willing to end the conflict without reopening the Strait of Hormuz, opting instead to weaken Iran's military capabilities and increase diplomatic pressure. This shift comes as an operation to unblock the strait was deemed likely to extend the conflict beyond his preferred timeline.", "source_name": "Times of India", "category": "india", "image_url": "https://static.toiimg.com/photo/msid-129915755,imgsize-20782.cms", "youtube_id": null, "video_url": null, "content": {"rewrite": "Trump reportedly ready to call it quits on Iran standoff without forcing Hormuz open. Prefers weakening Tehran's military over a messy operation that could drag past his timeline. Iran still not backing down.", "hot_take": "Trump choosing strategic restraint over military bravado? Iran calling America's bluff on Hormuz while India watches oil prices like a hawk. Sometimes the art of the deal means knowing when NOT to escalate. #Geopolitics", "thread": ["\ud83d\udea8 BREAKING: Trump reportedly ready to end Iran conflict WITHOUT reopening Hormuz Strait - a major strategic shift that could reshape Middle East dynamics and global oil markets. This isn't the 'maximum pressure' we expected.", "Key details: Operation to unblock Hormuz deemed too time-consuming for Trump's timeline. Instead, focus shifts to degrading Iran's military capabilities through targeted strikes + ramped up diplomatic pressure on Tehran.", "Iran's refusal to budge forces Trump into pragmatic corner - choosing timeline over total victory. But here's the question: Will this 'partial win' strategy actually deter Iran long-term, or just kick the can down the road? \ud83e\udd14"], "poll": {"tweet": "Trump reportedly willing to end Iran conflict without reopening Hormuz Strait, focusing on weakening military capabilities instead. Smart strategic pivot or dangerous precedent for future conflicts?", "options": ["Smart pivot", "Dangerous precedent", "Too early to say", "Wrong approach"]}}}, {"source_url": "https://timesofindia.indiatimes.com/world/middle-east/india-a-better-mediator-than-pakistan-israeli-envoy-on-middle-east-war/articleshow/129915515.cms", "original_title": "'India a better mediator than Pakistan': Israeli envoy on Middle East war", "original_summary": "Israel's envoy dismisses Pakistan's mediation efforts in the Middle East conflict, favoring India as a 'better mediator.' She highlighted significant military gains against Iran's proxies and internal instability within Iran. The envoy also emphasized a dual-track US strategy of diplomacy and military pressure, ruling out compromise on Iran's nuclear program.", "source_name": "Times of India", "category": "india", "image_url": "https://static.toiimg.com/photo/msid-129915548,imgsize-955340.cms", "youtube_id": null, "video_url": null, "content": {"rewrite": "Israeli envoy throws shade at Pakistan, calls India a \"better mediator\" for Middle East peace. Meanwhile, doubles down on military pressure against Iran's proxies while ruling out any nuclear compromise. Someone's clearly picking favorites in South Asia.", "hot_take": "Israel preferring India over Pakistan as mediator isn't diplomacy\u2014it's cherry-picking allies who won't question your actions. Real mediation requires neutrality, not validation. Pakistan's stance may be inconvenient, but that's exactly what makes mediation credible. #MiddleEast", "thread": ["\ud83d\udd25 Israeli envoy just delivered a diplomatic burn: 'India is a better mediator than Pakistan' on Middle East conflicts. Ouch. But what's behind this calculated snub? \ud83e\uddf5", "The timing isn't coincidental. Israel sees India as a strategic partner with growing influence, while Pakistan's ties with Iran and internal chaos make it an unreliable mediator in Israeli eyes.", "Envoy claims major wins against Iran's proxies + internal Iranian instability. Translation: Israel thinks it's winning and wants allies who can maintain pressure, not those seeking compromise.", "Real question: Is this Israel trying to pull India deeper into Middle East geopolitics? Modi's balancing act between Israel, Iran & Arab nations just got more complicated. Thoughts?"], "poll": {"tweet": "Israeli envoy says India is a 'better mediator than Pakistan' for Middle East conflicts. Interesting timing as both nations compete for regional influence. What drives this preference?", "options": ["Diplomatic neutrality", "Economic partnerships", "Strategic alignment", "Anti-Pakistan bias"]}}}, {"source_url": "https://www.thehindu.com/elections/assembly-elections-kerala-assam-west-bengal-tamil-nadu-puducherry-2026-live-updates/article70805616.ece", "original_title": "Assembly Election LIVE: BJP releases manifesto for Assam polls, promises UCC, steps against 'love jihad'", "original_summary": "Assam Chief Minister Himanta Biswa Sarma promises two lakh jobs in the next 5 years, and a flood-free State.", "source_name": "The Hindu", "category": "india", "image_url": "https://th-i.thgim.com/public/incoming/8uzfhq/article70805729.ece/alternates/LANDSCAPE_1200/PTI03_28_2026_000151A.jpg", "youtube_id": "XbGyHIBgSPM", "video_url": "https://www.youtube.com/watch?v=XbGyHIBgSPM", "content": {"rewrite": "BJP's Assam manifesto: 2 lakh jobs, flood-free state, UCC implementation, and \"love jihad\" measures. Himanta Biswa Sarma banking on development promises wrapped in familiar polarizing rhetoric. #AssamElections", "hot_take": "BJP's \"love jihad\" promises are just dog whistles to distract from their failures on floods and jobs. Assam needs infrastructure, not manufactured communal hysteria. Watch them deliver neither. #AssamElections", "thread": ["BJP's Assam manifesto drops the usual development promises but leads with UCC and 'love jihad' - because apparently jobs and floods are secondary to manufactured social anxieties. Classic playbook, predictable priorities. \ud83e\uddf5", "CM Himanta promises 2 lakh jobs in 5 years and a 'flood-free Assam' - ambitious targets that sound great on paper. But Assam faces annual flooding disasters and unemployment crisis. Can rhetoric match reality this time?", "The real question: Will voters prioritize actual governance issues like employment, infrastructure, and disaster management? Or will cultural dog-whistles overshadow bread-and-butter concerns again? Assam deserves better than performative politics."], "poll": {"tweet": "BJP's Assam manifesto promises 2 lakh jobs, flood-free state, UCC implementation, and anti-love jihad measures. Will development promises or polarizing rhetoric resonate more with voters?", "options": ["Development focus", "Social issues priority", "Both equally", "Neither convincing"]}}}, {"source_url": "https://www.thehindu.com/news/national/bihar/patna-hc-chief-justice-sangam-kumar-sahoo-inaugurates-extended-facilities-of-state-dispensary-at-hc-premises/article70803469.ece", "original_title": "Patna HC Chief Justice Sangam Kumar Sahoo inaugurates extended facilities of State dispensary at HC premises", "original_summary": "Facilities like free X-ray, ECG, eye check-up, physiotherapy, drug counters will be available at dispensary. Specialised doctors will be available as per roster in HC dispensary.", "source_name": "The Hindu", "category": "india", "image_url": "https://th-i.thgim.com/public/incoming/t1b90h/article70805806.ece/alternates/LANDSCAPE_1200/WhatsApp%20Image%202026-03-30%20at%2018.34.44.jpeg", "youtube_id": null, "video_url": null, "content": {"rewrite": "Patna HC gets a major healthcare upgrade! Free X-rays, ECGs, eye tests, physiotherapy & medicines now available on premises. Specialized doctors on roster too. Finally, justice seekers won't have to choose between health and hearings.", "hot_take": "While judges enjoy free X-rays and physiotherapy at HC dispensaries, common citizens queue for hours at understaffed government hospitals with broken equipment. Justice truly has VIP treatment in India. #JudicialPrivilege", "thread": ["While common citizens struggle with healthcare costs, Patna HC quietly expands its own premium dispensary with free X-rays, ECG, eye check-ups & physiotherapy. Nice facilities... for the privileged few. \ud83c\udfe5\u2696\ufe0f", "The HC dispensary now offers specialized doctors on roster, drug counters, and comprehensive medical services. All free, all exclusive. Meanwhile, public hospitals in Bihar remain understaffed and under-equipped.", "Why can't this model be replicated for public healthcare? If judiciary can organize quality medical care for itself, what stops similar initiatives for citizens? Or is healthcare equity just for constitutional lectures?"], "poll": {"tweet": "Patna HC Chief Justice inaugurates extended medical facilities at court premises - free X-ray, ECG, eye check-up, physiotherapy for all. Should all courts have such facilities?", "options": ["Yes, essential service", "Only for staff/lawyers", "Good but not priority", "Waste of resources"]}}}, {"source_url": "https://www.indiatoday.in/magazine/nation/story/20260323-superfast-ticketing-indian-railways-new-reservation-system-2881365-2026-03-14?utm_source=rss", "original_title": "Superfast ticketing - Indian Railways's new reservation system", "original_summary": "Superfast ticketing - Indian Railways's new reservation system", "source_name": "India Today", "category": "india", "image_url": "https://akm-img-a-in.tosshub.com/indiatoday/images/story/202603/superfast-ticketing--indian-railways-new-reservation-system-135448178-16x9_0.jpg?VersionId=VkIM0x4WVDMF5RmI3nxMjDRZQLI3cLrc", "youtube_id": null, "video_url": null, "content": {"rewrite": "Railway Ministry launches \"Superfast ticketing\" for instant reservations. Because apparently waiting 3 hours in IRCTC queues wasn't fast enough for our digital India dreams. Let's see if servers crash faster than our expectations. #DigitalIndia", "hot_take": "Railways launching \"superfast ticketing\" while trains still run 3 hours late is peak Indian government logic. Fix the delays first, then worry about booking speed. We don't need faster reservations for slower journeys. #IndianRailways", "thread": ["Indian Railways promises 'Superfast ticketing' - because apparently waiting 2 hours in queue followed by 'server down' wasn't fast enough. Let's see what this new system actually delivers. \ud83e\uddf5", "The new reservation system claims faster booking, real-time seat availability, and reduced server crashes during peak hours. Sounds familiar? We've heard these promises since the dial-up internet era.", "Early reports suggest improved user interface and mobile optimization. But the real test will be during festival season when half of India tries to book Duronto Express simultaneously at 10 AM sharp.", "Will this finally end the era of refreshing IRCTC 47 times only to see 'payment failed but money deducted'? Or is this just digital lipstick on the same old pig? Your experiences welcome."], "poll": {"tweet": "Indian Railways launches 'Superfast ticketing' - a new reservation system promising faster bookings. With current tech glitches and server crashes during rush, will this actually deliver or just another announcement?", "options": ["Game changer", "Just marketing hype", "Wait and watch", "Same old issues"]}}}, {"source_url": "https://www.indiatoday.in/magazine/nation/story/20260316-tirupati-laddu-sour-taste-in-sweet-saga-2878639-2026-03-07?utm_source=rss", "original_title": "Tirupati laddu | Sour taste in sweet saga", "original_summary": "Tirupati laddu | Sour taste in sweet saga", "source_name": "India Today", "category": "india", "image_url": "https://akm-img-a-in.tosshub.com/indiatoday/images/story/202603/tirupati-laddu-controversy--sour-taste-in-sweet-saga-074024663-16x9_0.jpg?VersionId=yM0nTyozYMvcNDaHm7CxvxlHVh2w2LU7", "youtube_id": null, "video_url": null, "content": {"rewrite": "The sacred Tirupati laddu controversy leaves a bitter aftertaste. When politics mixes with prasadam, even devotion gets adulterated. Some battles should never be fought in temple corridors. #TirupatiLaddu", "hot_take": "The sacred Tirupati laddu controversy shows how even our holiest traditions aren't safe from corporate greed and regulatory failure. When devotion becomes a business model, faith gets adulterated along with the prasadam. #TirupatiLaddu", "thread": ["The sacred Tirupati laddu controversy has left devotees with a bitter aftertaste. When faith meets food safety failures, who's really accountable? \ud83e\uddf5", "Reports suggest adulteration in the prasadam that millions consume with reverence. The temple's sanctity questioned, devotees' trust shaken. This isn't just about food quality\u2014it's about betraying centuries of faith.", "TTD's oversight mechanisms clearly failed. But here's the real question: In our rush to commercialize religious practices, are we losing the very essence of what makes them sacred?", "Time for complete transparency in temple administration. Devotees deserve better than hollow apologies. Will this wake-up call finally reform how our religious institutions operate? #TirupatiLaddu"], "poll": {"tweet": "The sacred Tirupati laddu controversy has left devotees questioning temple administration and food safety standards. From adulteration allegations to political blame games - what's your biggest concern?", "options": ["Food safety standards", "Temple administration", "Political interference", "Devotee trust erosion"]}}}, {"source_url": "https://www.hindustantimes.com/india-news/assam-assembly-polls-bjp-manifesto-promises-rs-5-lakh-crore-investment-protection-of-indigenous-people-101774933886788.html", "original_title": "Assam assembly polls: BJP manifesto promises \u20b95 lakh crore investment, protection of indigenous people", "original_summary": "BJP's 'Sankalp Patra' comprises 31 promises, including the recovery of encroached land from Bangladeshi Miyas, bringing UCC, and ensuring development.", "source_name": "Hindustan Times", "category": "india", "image_url": "https://www.hindustantimes.com/ht-img/img/2026/03/31/1600x900/logo/ANI-20260323378-0_1774934065092_1774934112892.jpg", "youtube_id": null, "video_url": null, "content": {"rewrite": "BJP's Assam manifesto drops \u20b95 lakh crore investment promise while playing the usual Bangladeshi Miya card and UCC tune. Same old playbook: mega numbers for headlines, divisive rhetoric for votes. Will voters buy this again? #AssamElections", "hot_take": "BJP's Assam manifesto reads like a greatest hits album of divisive politics: Promise development with one hand, dog-whistle about \"Bangladeshi Miyas\" with the other. \u20b95L crore sounds impressive until you realize it's the same playbook that got Manipur burning. #AssamPolls", "thread": ["BJP's Assam manifesto: \u20b95 lakh crore investment promise + 'Bangladeshi Miyas' land recovery + UCC. Same old playbook or genuine development agenda? \ud83e\uddf5", "31 promises in the 'Sankalp Patra' focus heavily on 'indigenous protection' - code for targeting Bengali Muslim communities who've lived there for generations. Classic polarization strategy.", "\u20b95 lakh crore sounds impressive until you remember similar tall promises from 2016 and 2021. Meanwhile, actual issues like flood management and unemployment take backseat to communal rhetoric.", "UCC + land 'recovery' + indigenous protection = textbook BJP formula. Question is: will Assamese voters buy the same polarizing package again, or demand actual governance solutions?"], "poll": {"tweet": "BJP's Assam manifesto: \u20b95L cr investment + indigenous protection + UCC + land recovery from 'Bangladeshi Miyas'. Big promises or election rhetoric?", "options": ["Game changer", "Empty promises", "Polarization tactic", "Development focus"]}}}, {"source_url": "https://www.hindustantimes.com/india-news/tvk-vijay-r-sabarinathan-drivers-son-candidates-tamil-nadu-elections-viral-video-101774933450596.html", "original_title": "From Vijay's driver's son to TVK candidate: The story behind viral video", "original_summary": "R Sabarinathan is the son of Vijay's long-time driver-turned-PA - who stood by visibly moved as his son was comforted by the star.&nbsp;", "source_name": "Hindustan Times", "category": "india", "image_url": "https://www.hindustantimes.com/ht-img/img/2026/03/31/1600x900/logo/PTI03-30-2026-000282A-0_1774933571491_1774933619701.jpg", "youtube_id": null, "video_url": null, "content": {"rewrite": "The son of Vijay's driver just became a TVK candidate. That emotional moment when the superstar comforted him lines are being missed. What's brewing behind the scenes? \ud83e\udd14 #Tollywood", "Nani's 'The Paradise' and Chay's 'Vrushakarma' - two highly anticipated big-budget films that were supposed to light up summer screens are now officially pushed! \ud83d\udcc5 When ambition meets production reality... \ud83d\udcb8", "The young guns are clearly playing it safe with bigger budgets and longer schedules. But here's the question: Will this calculated risk pay off, or are they missing the summer goldmine? \ud83c\udfc6 What's your take, Telugu cinema fans?"], "poll": {"tweet": "Summer 2026 looking empty! Young stars like Nani & Chay pushed their big films - The Paradise & Vrushakarma missing the hot season. Quality over deadlines or bad planning?", "options": ["Quality over speed", "Poor planning", "Post-production delays", "Market strategy"]}}}, {"source_url": "https://www.telugu360.com/peddi-release-buchi-babu-gets-trolled/", "original_title": "Peddi Release: Buchi Babu gets Trolled", "original_summary": "Buchi Babu Sana made an impressive debut with Uppena and the film ended up as a blockbuster. He waited for almost two years for the arrival of Charan and his next film Peddi featuring Ram Charan is in the final stages of shoot. The makers announced that the film releases on April 30th but there [&#8230;] The post Peddi Release: Buchi Babu gets Trolled appeared first on Telugu360.", "source_name": "Telugu360", "category": "telugu_film", "image_url": "https://cdn.telugu360.com/wp-content/uploads/2022/05/Director-Buchibabu-sana.jpg", "youtube_id": null, "video_url": null, "content": {"rewrite": "When you announce April 30th release for #RamCharan's Peddi but forgot to mention which year \ud83d\ude05 Buchi Babu getting roasted harder than his Uppena success was praised! Fans deserve clarity, not calendar confusion \ud83d\udcc5", "hot_take": "Buchi Babu announcing Peddi's April 30th release without confirming Ram Charan's dates is peak overconfidence! Uppena's success doesn't <script>
var NEWS = JSON.parse(document.getElementById('d-news').textContent);
var HYPE = JSON.parse(document.getElementById('d-hype').textContent);
var VIDS = JSON.parse(document.getElementById('d-vids').textContent);

var activeCat = 'usa';
var activeFmt = 'all';
var searchQ   = '';

var CAT_MAP = {
  usa:'usa', world:'world', india:'india',
  telugu:'telugu', telugu_film:'film'
};
var CAT_META = {
  usa:   {lbl:'USA',            icon:'&#127482;&#127480;', tcls:'t-usa'},
  world: {lbl:'International',  icon:'&#127757;',          tcls:'t-world'},
  india: {lbl:'India',          icon:'&#127470;&#127475;', tcls:'t-india'},
  telugu:{lbl:'Telugu',         icon:'&#127897;',          tcls:'t-telugu'},
  film:  {lbl:'Telugu Film',    icon:'&#127909;',          tcls:'t-film'},
  hype:  {lbl:'Hypocrisy Watch',icon:'&#127917;',          tcls:''}
};
var HCAT_CLR = {
  usa:'var(--c-usa)', world:'var(--c-world)', india:'var(--c-india)',
  telugu:'var(--c-telugu)', telugu_film:'var(--c-film)'
};
var FMT_LBL = {rewrite:'Rewrite', hot_take:'Hot Take', thread:'Thread', poll:'Poll'};

function esc(s) {
  return String(s||'')
    .replace(/&/g,'&amp;').replace(/</g,'&lt;')
    .replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

function copyText(text, btn) {
  navigator.clipboard.writeText(text).then(function() {
    var o = btn.textContent;
    btn.textContent = 'Copied!';
    btn.classList.add('ok');
    setTimeout(function(){ btn.textContent = o; btn.classList.remove('ok'); }, 1800);
  });
}

function imgErr(img) {
  var w = img.closest('.nc-img-wrap') || img.closest('.vc-thumb');
  if (w) w.style.display = 'none';
}

function bSimple(text) {
  if (!text) return '<div class="none-msg">Not generated</div>';
  var n = text.length;
  var cls = n > 280 ? 'over' : n > 240 ? 'warn' : '';
  return '<div class="tweet-box">' + esc(text) +
    '<button class="cp-btn" data-t="' + esc(text) + '" onclick="copyText(this.dataset.t,this)">&#128203; Copy</button>' +
    '</div><div class="char-c ' + cls + '">' + n + ' / 280</div>';
}

function bThread(tweets) {
  if (!tweets || !tweets.length) return '<div class="none-msg">Not generated</div>';
  var n = tweets.length;
  var rows = '';
  for (var i = 0; i < tweets.length; i++) {
    rows += '<div class="thread-tw"><div class="thread-n">' + (i+1) + '/' + n + '</div>' +
      esc(tweets[i]) +
      '<button class="tcp" data-t="' + esc(tweets[i]) + '" onclick="copyText(this.dataset.t,this)">Copy</button></div>';
  }
  var all = '';
  for (var j = 0; j < tweets.length; j++) { all += (j+1)+'/'+n+' '+tweets[j]+'

'; }
  return '<div class="thread-list">' + rows + '</div>' +
    '<button class="cp-all" data-t="' + esc(all) + '" onclick="copyText(this.dataset.t,this)">Copy Entire Thread</button>';
}

function bPoll(d) {
  if (!d) return '<div class="none-msg">Not generated</div>';
  var opts = '';
  for (var i = 0; i < (d.options||[]).length; i++) {
    opts += '<div class="poll-opt">' + esc(d.options[i]) + '</div>';
  }
  return '<div class="poll-tw">' + esc(d.tweet) +
    '<button class="cp-btn" data-t="' + esc(d.tweet) + '" onclick="copyText(this.dataset.t,this)">Copy</button></div>' +
    '<div class="poll-opts">' + opts + '</div>' +
    '<div class="poll-note">Create poll manually on X with these 4 options</div>';
}

function buildNewsCard(item, uid) {
  var dk   = CAT_MAP[item.category] || item.category;
  var meta = CAT_META[dk] || CAT_META.usa;
  var c    = item.content || {};
  var fmts = activeFmt === 'all' ? ['rewrite','hot_take','thread','poll'] : [activeFmt];

  var imgHtml = '';
  if (item.image_url) {
    imgHtml = '<div class="nc-img-wrap">' +
      '<img src="' + esc(item.image_url) + '" loading="lazy" onerror="imgErr(this)" alt=""/>' +
      '<div class="img-overlay">' +
      '<a class="img-btn" href="' + esc(item.image_url) + '" target="_blank">View Image</a>' +
      (item.youtube_id ? '<a class="img-btn" href="https://www.youtube.com/watch?v=' + esc(item.youtube_id) + '" target="_blank">Watch Video</a>' : '') +
      '</div>' +
      (item.youtube_id ? '<div class="yt-badge">YouTube</div>' : '') +
      '</div>';
  }

  var tabs = '', panels = '';
  for (var i = 0; i < fmts.length; i++) {
    var f = fmts[i];
    var active = i === 0 ? ' active' : '';
    tabs += '<button class="ftab' + active + '" onclick="swTab(this,'' + uid + '','' + f + '')">' + (FMT_LBL[f]||f) + '</button>';
    var inner = f==='thread' ? bThread(c.thread) : f==='poll' ? bPoll(c.poll) : bSimple(c[f]);
    panels += '<div class="panel' + active + '" data-uid="' + uid + '" data-fmt="' + f + '">' + inner + '</div>';
  }

  return '<div class="news-card" data-title="' + esc((item.original_title||'').toLowerCase()) + '">' +
    imgHtml +
    '<div class="nc-head"><span class="src-tag ' + meta.tcls + '">' + meta.lbl + '</span>' +
    '<div class="nc-src">' + esc(item.source_name||'') + '</div></div>' +
    '<div class="nc-orig"><div class="nc-ttl"><a href="' + esc(item.source_url) + '" target="_blank">' + esc(item.original_title) + '</a></div>' +
    (item.original_summary ? '<button class="tog" onclick="togSum(this)">show summary</button><div class="nc-sum">' + esc(item.original_summary) + '</div>' : '') +
    '</div>' +
    '<div class="nc-tabs">' + tabs + '</div>' +
    '<div class="nc-panels">' + panels + '</div></div>';
}

function buildVideoCard(vid) {
  var tw = vid.tweet_content || {};
  var twHtml = '';
  if (tw.rewrite)  twHtml += '<div><div class="vc-tweet-lbl">Rewrite</div>'  + bSimple(tw.rewrite)  + '</div>';
  if (tw.hot_take) twHtml += '<div><div class="vc-tweet-lbl">Hot Take</div>' + bSimple(tw.hot_take) + '</div>';
  if (!twHtml) twHtml = '<div class="none-msg">No tweet content</div>';
  return '<div class="video-card">' +
    '<div class="vc-thumb"><img src="' + esc(vid.thumbnail) + '" loading="lazy" onerror="imgErr(this)" alt=""/>' +
    '<a class="vc-play" href="' + esc(vid.url) + '" target="_blank"><div class="vc-play-icon">&#9654;</div></a>' +
    (vid.trending ? '<div class="vc-trending">TRENDING</div>' : '') + '</div>' +
    '<div class="vc-body"><div class="vc-channel">&#9654; ' + esc(vid.channel) + '</div>' +
    '<div class="vc-title"><a href="' + esc(vid.url) + '" target="_blank">' + esc(vid.title) + '</a></div>' +
    '<div class="vc-tweets">' + twHtml + '</div></div></div>';
}

function buildHypeCard(h) {
  var col = HCAT_CLR[h.category] || 'var(--c-hype)';
  var catLbl = (h.category||'').replace('_',' ').toUpperCase();
  return '<div class="hype-card"><div class="hype-tw">' + esc(h.tweet) +
    '<button class="cp-btn" data-t="' + esc(h.tweet) + '" onclick="copyText(this.dataset.t,this)">Copy</button></div>' +
    '<div class="hype-based"><b>Based on:</b> ' + esc(h.based_on||'') +
    (h.category ? '<span class="hcat" style="background:' + col + '22;color:' + col + '">' + catLbl + '</span>' : '') +
    '</div></div>';
}

function renderAll() {
  var groups    = {usa:[],world:[],india:[],telugu:[],film:[]};
  var vidGroups = {usa:[],world:[],india:[],telugu:[],film:[]};

  for (var i = 0; i < NEWS.length; i++) {
    var dk = CAT_MAP[NEWS[i].category] || NEWS[i].category;
    if (groups[dk]) groups[dk].push(NEWS[i]);
  }
  for (var j = 0; j < VIDS.length; j++) {
    var vdk = CAT_MAP[VIDS[j].category] || VIDS[j].category;
    if (vidGroups[vdk]) vidGroups[vdk].push(VIDS[j]);
  }

  var allCats = [
    {dk:'usa',    ncId:'nc-usa',    secId:'sec-usa',    meta:CAT_META.usa},
    {dk:'world',  ncId:'nc-world',  secId:'sec-world',  meta:CAT_META.world},
    {dk:'india',  ncId:'nc-india',  secId:'sec-india',  meta:CAT_META.india},
    {dk:'telugu', ncId:'nc-telugu', secId:'sec-telugu', meta:CAT_META.telugu},
    {dk:'film',   ncId:'nc-film',   secId:'sec-film',   meta:CAT_META.film}
  ];

  for (var k = 0; k < allCats.length; k++) {
    var cat    = allCats[k];
    var ncEl   = document.getElementById(cat.ncId);
    var secEl  = document.getElementById(cat.secId);
    var items  = (groups[cat.dk]||[]).filter(function(it) {
      return !searchQ || (it.original_title||'').toLowerCase().indexOf(searchQ) >= 0;
    });
    var vids   = (vidGroups[cat.dk]||[]).filter(function(v) {
      return !searchQ || (v.title||'').toLowerCase().indexOf(searchQ) >= 0;
    });

    if (ncEl) ncEl.textContent = items.length + vids.length;

    if (!secEl) continue;
    var newsHtml = '';
    if (items.length) {
      for (var m = 0; m < items.length; m++) { newsHtml += buildNewsCard(items[m], cat.dk+'_'+m); }
    } else {
      newsHtml = '<div class="empty" style="padding:30px">No items<small>Try different filters</small></div>';
    }
    var vidsHtml = '';
    if (vids.length) {
      vidsHtml = '<div class="subsec-lbl">Videos &mdash; ' + vids.length + '</div>';
      for (var p = 0; p < vids.length; p++) { vidsHtml += buildVideoCard(vids[p]); }
    }
    secEl.innerHTML =
      '<div class="sec-head"><span class="sec-icon">' + cat.meta.icon + '</span>' +
      '<span class="sec-title">' + cat.meta.lbl + '</span>' +
      '<span class="sec-count">' + items.length + ' news &middot; ' + vids.length + ' videos</span></div>' +
      newsHtml + vidsHtml;
  }

  var hEl   = document.getElementById('nc-hype');
  var hSec  = document.getElementById('sec-hype');
  var hItems = HYPE.filter(function(h) {
    return !searchQ || (h.tweet+h.based_on).toLowerCase().indexOf(searchQ) >= 0;
  });
  if (hEl) hEl.textContent = hItems.length;
  if (hSec) {
    var hHtml = '';
    if (hItems.length) {
      for (var q = 0; q < hItems.length; q++) { hHtml += buildHypeCard(hItems[q]); }
    } else {
      hHtml = '<div class="empty">No hypocrisy found<small>(Unlikely)</small></div>';
    }
    hSec.innerHTML =
      '<div class="sec-head"><span class="sec-icon">&#127917;</span>' +
      '<span class="sec-title">Hypocrisy Watch</span>' +
      '<span class="sec-count">' + hItems.length + ' tweets</span></div>' + hHtml;
  }
}

function showCat(cat, btn) {
  activeCat = cat;
  var btns = document.querySelectorAll('.nav-btn');
  for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
  btn.classList.add('active');
  var secs = document.querySelectorAll('.cat-sec');
  for (var j = 0; j < secs.length; j++) secs[j].style.display = 'none';
  var sid = cat==='hype' ? 'sec-hype' : cat==='film' ? 'sec-film' : 'sec-'+cat;
  var sec = document.getElementById(sid);
  if (sec) sec.style.display = 'block';
  var pills = document.getElementById('fmt-pills');
  if (pills) pills.style.display = cat==='hype' ? 'none' : 'flex';
}

function setFmt(fmt, btn) {
  activeFmt = fmt;
  var pills = document.querySelectorAll('.fpill');
  for (var i = 0; i < pills.length; i++) pills[i].classList.remove('active');
  btn.classList.add('active');
  renderAll();
}

function doSearch(q) {
  searchQ = q.toLowerCase().trim();
  renderAll();
}

function swTab(btn, uid, fmt) {
  var card = btn.closest('.news-card');
  if (!card) return;
  var tabs   = card.querySelectorAll('.ftab');
  var panels = card.querySelectorAll('.panel');
  for (var i = 0; i < tabs.length;   i++) tabs[i].classList.remove('active');
  for (var j = 0; j < panels.length; j++) panels[j].classList.remove('active');
  btn.classList.add('active');
  var target = card.querySelector('.panel[data-uid="' + uid + '"][data-fmt="' + fmt + '"]');
  if (target) target.classList.add('active');
}

function togSum(btn) {
  var s = btn.nextElementSibling;
  if (!s) return;
  s.style.display = s.style.display === 'block' ? 'none' : 'block';
  btn.textContent = s.style.display === 'block' ? 'hide summary' : 'show summary';
}

renderAll();
</script>
</body>
</html>
