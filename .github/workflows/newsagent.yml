name: NewsAgent — Generate Tweets

on:
  schedule:
    - cron: '0 */3 * * *'   # every 3 hours

  workflow_dispatch:
    inputs:
      max_items:
        description: 'Max items per RSS source (default 3)'
        required: false
        default: '3'
      category:
        description: 'Filter: usa | world | india | telugu | telugu_film (blank = all)'
        required: false
        default: ''
      skip_hypocrisy:
        description: 'Skip hypocrisy pass? (true/false)'
        required: false
        default: 'false'
      skip_youtube:
        description: 'Skip YouTube videos? (true/false)'
        required: false
        default: 'true'
      skip_trending:
        description: 'Skip trending hashtags? (true/false)'
        required: false
        default: 'false'

jobs:
  generate:
    name: Scrape, Generate & Publish
    runs-on: ubuntu-latest
    timeout-minutes: 25
    permissions:
      contents: write

    steps:
      # ── 1. Checkout ────────────────────────────────────────────────────────
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # ── 2. Python setup ────────────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install Python dependencies
        run: pip install -r requirements.txt

      # ── 3. Install Ollama ──────────────────────────────────────────────────
      - name: Install Ollama
        run: |
          curl -fsSL https://ollama.com/install.sh | sh
          echo "Ollama installed"

      # ── 4. Cache Ollama model (avoids 2GB download every run) ─────────────
      - name: Cache Ollama model
        uses: actions/cache@v4
        id: model-cache
        with:
          path: ~/.ollama/models
          key: ollama-qwen2.5-3b-v1

      # ── 5. Start Ollama and pull model ─────────────────────────────────────
      - name: Start Ollama and pull model
        run: |
          ollama serve &
          sleep 8
          if [ "${{ steps.model-cache.outputs.cache-hit }}" != "true" ]; then
            echo "Downloading qwen2.5:3b model (~2GB, cached after this)..."
            ollama pull qwen2.5:3b
          else
            echo "Model loaded from cache — skipping download."
            ollama pull qwen2.5:3b 2>/dev/null || true
          fi
          # Verify model is ready
          ollama list
          echo "Ollama ready."
        env:
          OLLAMA_MODELS: ~/.ollama/models

      # ── 6. Run NewsAgent ───────────────────────────────────────────────────
      - name: Run NewsAgent
        env:
          GROQ_API_KEY:    ${{ secrets.GROQ_API_KEY }}     # fallback if Ollama fails
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}  # optional
          OLLAMA_URL:      "http://localhost:11434"
          OLLAMA_MODEL:    "qwen2.5:3b"
        run: |
          MAX="${{ github.event.inputs.max_items    || '3' }}"
          CAT="${{ github.event.inputs.category     || '' }}"
          SKIP_H="${{ github.event.inputs.skip_hypocrisy || 'false' }}"
          SKIP_Y="${{ github.event.inputs.skip_youtube   || 'true' }}"
          SKIP_T="${{ github.event.inputs.skip_trending  || 'false' }}"

          CMD="python run.py --no-browser --max $MAX"
          [ -n "$CAT"          ] && CMD="$CMD --category $CAT"
          [ "$SKIP_H" = "true" ] && CMD="$CMD --skip-hypocrisy"
          [ "$SKIP_Y" = "true" ] && CMD="$CMD --skip-youtube"
          [ "$SKIP_T" = "true" ] && CMD="$CMD --skip-trending"

          echo "Running: $CMD"
          $CMD

      # ── 7. Commit viewer ───────────────────────────────────────────────────
      - name: Commit & push viewer
        run: |
          git config user.name  "NewsAgent Bot"
          git config user.email "newsagent-bot@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🗞️ $(date -u '+%Y-%m-%d %H:%M UTC')"
            git pull --rebase origin master || git pull --rebase origin main
            git push
          fi
