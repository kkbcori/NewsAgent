name: NewsAgent — Generate Tweets

on:
  schedule:
    - cron: '0 */3 * * *'
  workflow_dispatch:
    inputs:
      max_items:
        description: 'Max items per RSS source (default 5)'
        required: false
        default: '5'
      skip_hypocrisy:
        description: 'Skip hypocrisy pass? (true/false)'
        required: false
        default: 'false'
      skip_youtube:
        description: 'Skip YouTube videos? (true/false)'
        required: false
        default: 'false'

jobs:
  generate:
    name: Scrape, Generate & Publish
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run NewsAgent
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          YOUTUBE_API_KEY:   ${{ secrets.YOUTUBE_API_KEY }}
        run: |
          MAX="${{ github.event.inputs.max_items || '5' }}"
          SKIP_H="${{ github.event.inputs.skip_hypocrisy || 'false' }}"
          SKIP_Y="${{ github.event.inputs.skip_youtube || 'false' }}"

          CMD="python run.py --no-browser --max $MAX"
          [ "$SKIP_H" = "true" ] && CMD="$CMD --skip-hypocrisy"
          [ "$SKIP_Y" = "true" ] && CMD="$CMD --skip-youtube"

          echo "▶ $CMD"
          $CMD

      - name: Commit & push viewer
        run: |
          git config user.name  "NewsAgent Bot"
          git config user.email "newsagent-bot@users.noreply.github.com"
          git add docs/
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "🗞️ $(date -u '+%Y-%m-%d %H:%M UTC')"
            git push
          fi